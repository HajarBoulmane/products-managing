<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.6/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<div class="row mt-5">
    <div class="col col-md-4 offset-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Authentication</h5>
            </div>
            <div class="card-body">   <!-- ✅ ouvert -->
                <form method="post" th:action="@{/login}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control">
                    </div>
                    <button class="btn btn-primary w-100">Login</button>
                </form>
            </div>   <!-- ✅ fermé ici -->
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.6/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
