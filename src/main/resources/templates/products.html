<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout1}">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
<div class="p-3" layout:fragment="content1" >
    <div class="p-3">
        <a class="btn btn-primary" th:href="@{newProduct}">New Product</a>
    </div>
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th><th>Nom</th><th>Prix</th><th>Quantité</th><th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${productList}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.price}"></td>
                    <td th:text="${p.quantity}"></td>
                    <td>
                        <a class="btn btn-danger btn-sm"
                           onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')"
                           th:href="@{/delete(id=${p.id})}">Supprimer</a>
                    </td>
                </tr>
                </tbody>
            </table>
    </div>
</div>
</body>
</html>
