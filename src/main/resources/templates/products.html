<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" type="text/css"  href="/webjars/bootstrap/5.3.6/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <title>Product</title>
</head>
<body>
<div class="p-3">
    <table class="table">
        <thead>
        <th>ID</th> <th>Name</th> <th>Price</th> <th>Quantity</th>
        </thead>
        <tbody>
        <tr th:each="p:${productList}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td>
                <a class="btn btn-danger"  onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')"
                   th:href="@{/delete(id=${p.id})}">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
